[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# Show short-test-summary for failures and warnings.
addopts = "-ra -q"

[tool.coverage.run]
source = ["custom_components/green_button_energy"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 80

[tool.ruff]
target-version = "py313"
line-length = 99

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "ANN", "BLE", "C4", "SIM"]
ignore = [
  "ANN401",  # Dynamically typed Any in return/param (used in sensor lookup)
]

[tool.black]
line-length = 99
target-version = ["py313"]

[tool.isort]
profile = "black"
line_length = 99

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true