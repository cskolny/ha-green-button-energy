[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# Show short-test-summary for failures and warnings.
addopts = "-ra -q"

[tool.coverage.run]
source = ["custom_components/green_button_energy"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 80

[tool.ruff]
target-version = "py313"
line-length = 99

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "ANN", "BLE", "C4", "SIM"]
ignore = [
  "ANN401",  # Dynamically typed Any in return/param (used in sensor lookup)
]

[tool.ruff.lint.isort]
# Tell ruff's isort which packages are first-party so import grouping is correct.
known-first-party = ["custom_components.green_button_energy"]
# Consistent with black profile: one blank line between import sections.
force-sort-within-sections = false

# Formatting is handled by ruff format (black-compatible).
# Configuration lives in [tool.ruff] above (line-length, target-version).

[tool.isort]
profile = "black"
line_length = 99

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
