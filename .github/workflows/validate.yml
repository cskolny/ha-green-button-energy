name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration
