name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Ruff · isort · mypy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install lint dependencies
        run: |
          pip install --upgrade pip
          pip install ruff isort mypy \
            homeassistant \
            voluptuous

      - name: ruff check
        run: ruff check custom_components/

      - name: ruff format --check
        # ruff format is a black-compatible formatter (implements the black style).
        # Running both black and ruff format is redundant — ruff format IS the
        # black algorithm. We use ruff format --check in place of black --check.
        run: ruff format --check custom_components/

      - name: isort --check
        run: isort --check-only custom_components/

      - name: mypy
        run: |
          mypy custom_components/green_button_energy \
            --ignore-missing-imports \
            --strict
